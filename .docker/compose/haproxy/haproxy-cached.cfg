# HAProxy configuration for Approach C: Read-Only Replicas + HTTP Cache
# Adds HAProxy's built-in cache for S3 GET responses.
# Objects are cached in shared RAM, avoiding backend round-trips for hot objects.

global
    maxconn 50000
    log stdout format raw local0

defaults
    mode http
    timeout connect 5s
    timeout client 30s
    timeout server 30s
    log global
    option httplog

# 256 MB shared cache, max object 10 MB, TTL 5 minutes
cache s3cache
    total-max-size 256
    max-object-size 10485760
    max-age 300
    process-vary off

frontend rustfs_frontend
    bind *:8080

    # Cache GET requests only (safe for read-only workloads)
    http-request cache-use s3cache if { method GET }
    http-response cache-store s3cache if { status 200 }

    default_backend rustfs_readonly

backend rustfs_readonly
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200

    server replica0 replica0:9000 check inter 5s fall 3 rise 2
    server replica1 replica1:9000 check inter 5s fall 3 rise 2
    server replica2 replica2:9000 check inter 5s fall 3 rise 2
    server replica3 replica3:9000 check inter 5s fall 3 rise 2

frontend stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
