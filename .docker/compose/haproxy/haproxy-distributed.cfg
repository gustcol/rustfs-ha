# HAProxy configuration for Approach A: Distributed Cluster
# Load balances across 4 erasure-coded RustFS nodes

global
    maxconn 50000
    log stdout format raw local0

defaults
    mode http
    timeout connect 5s
    timeout client 30s
    timeout server 30s
    log global
    option httplog

frontend rustfs_frontend
    bind *:8080
    default_backend rustfs_distributed

backend rustfs_distributed
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200

    server node0 node0:9000 check inter 5s fall 3 rise 2
    server node1 node1:9000 check inter 5s fall 3 rise 2
    server node2 node2:9000 check inter 5s fall 3 rise 2
    server node3 node3:9000 check inter 5s fall 3 rise 2

frontend stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
