# HAProxy configuration for Approach B: Read-Only Replicas
# Load balances across 4 standalone RustFS instances sharing the same data volume

global
    maxconn 50000
    log stdout format raw local0

defaults
    mode http
    timeout connect 5s
    timeout client 30s
    timeout server 30s
    log global
    option httplog

frontend rustfs_frontend
    bind *:8080
    default_backend rustfs_readonly

backend rustfs_readonly
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200

    server replica0 replica0:9000 check inter 5s fall 3 rise 2
    server replica1 replica1:9000 check inter 5s fall 3 rise 2
    server replica2 replica2:9000 check inter 5s fall 3 rise 2
    server replica3 replica3:9000 check inter 5s fall 3 rise 2

frontend stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
